<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Skills | Farras</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- NAVBAR GLOBAL -->
    <header>
        <div class="container navbar">
            <div class="logo"><a href="index.html">FARRAS.</a></div>
            <button class="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </header>

    <!-- KONTEN UTAMA HALAMAN SKILLS -->
    <main class="container" style="padding-top: 40px;">
        <h2 class="neo-box" style="background: var(--accent-purple); color:#fff; display: inline-block;">Kemampuan Teknis</h2>
        
        <div class="skills-grid">
            <!-- Card Skill HTML -->
            <div class="neo-box skill-card">
                <div class="icon">🌐</div>
                <h3>HTML & CSS</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar" data-target="90"></div>
                </div>
            </div>
            <!-- Card Skill JS -->
            <div class="neo-box skill-card">
                <div class="icon">⚡</div>
                <h3>JavaScript</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar" data-target="80" style="background: var(--accent-yellow);"></div>
                </div>
            </div>
            <!-- Card Skill Git -->
            <div class="neo-box skill-card">
                <div class="icon">🐙</div>
                <h3>Git & GitHub</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar" data-target="85" style="background: var(--bg-main);"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER GLOBAL -->
    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 Farras. All Rights Reserved.</p>
            <div class="footer-socials">
                <a href="https://github.com" target="_blank">GitHub</a>
                <a href="https://linkedin.com" target="_blank">LinkedIn</a>
                <a href="https://instagram.com" target="_blank">Instagram</a>
            </div>
        </div>
    </footer>
    <button id="backToTop" class="neo-btn purple">↑ Top</button>
    <script src="assets/js/script.js"></script>

</body>
</html>
